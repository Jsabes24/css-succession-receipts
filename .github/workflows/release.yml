name: Release

# Tag-driven provenance for the open format. A release ships no code — it
# publishes tamper-evident proofs over the conformance corpus checksums: a
# cosign keyless signature (Sigstore/Rekor) and an OpenTimestamps proof
# (Bitcoin). The version tag itself is an SSH-signed tag made offline by the
# maintainer; this workflow verifies the tree and anchors the digest. See
# PROVENANCE.md. Also manually dispatchable with a version input — gh release
# create then mints the tag at the dispatched commit.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.1.1); the tag is created at the dispatched commit"
        required: true
        type: string

permissions:
  contents: write
  id-token: write # cosign keyless signing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Corpus integrity gate (published revisions are immutable)
        run: sha256sum -c corpus/SHA256SUMS

      - name: Stage the checksums for signing
        run: |
          set -euo pipefail
          mkdir -p dist
          cp corpus/SHA256SUMS dist/SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign the checksums (keyless)
        # cosign v3 emits a single Sigstore bundle carrying signature +
        # certificate + Rekor transparency-log proof. Verify with:
        #   cosign verify-blob dist/SHA256SUMS --bundle dist/SHA256SUMS.sigstore.json \
        #     --certificate-identity-regexp 'github\.com/[Jj]sabes24/css-succession-receipts' \
        #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
        run: |
          cosign sign-blob --yes dist/SHA256SUMS \
            --bundle dist/SHA256SUMS.sigstore.json

      - name: Install OpenTimestamps client
        run: pipx install opentimestamps-client

      - name: Timestamp the checksums (Bitcoin, via OpenTimestamps)
        # Produces dist/SHA256SUMS.ots, initially pending calendar attestation.
        # Verify later with: ots verify dist/SHA256SUMS.ots  (against dist/SHA256SUMS)
        # The maintainer runs `ots upgrade` once the Bitcoin attestation confirms.
        run: |
          set -euo pipefail
          ots stamp dist/SHA256SUMS
          test -f dist/SHA256SUMS.ots

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ inputs.version || github.ref_name }}"
          gh release create "$version" \
            dist/SHA256SUMS dist/SHA256SUMS.sigstore.json dist/SHA256SUMS.ots \
            --target "$GITHUB_SHA" \
            --title "Succession Receipts $version" \
            --generate-notes
